<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GhoshAI</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: transparent;
        }

        /* Header */
        .header {
            width: 100%;
            height: 90px; /* Increased size */
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;

            display: flex;
            align-items: center;
            justify-content: center;

            /* Background Image */
            background: url("Q4_EE_Tunnel_B_V057+(00036).jpg") center/cover no-repeat;

            /* Static RGB Glow */
            border-bottom: 3px solid #00ffff;

            box-shadow:
                0 0 10px #ff00ff,
                0 0 20px #00ffff,
                0 0 30px #0000ff;

            backdrop-filter: blur(4px);
        }

        /* Dark overlay for readability */
        .header::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
        }

        .header h1 {
            position: relative;
            z-index: 2;

            font-size: 34px;
            font-weight: bold;
            letter-spacing: 3px;

            background: linear-gradient(
                90deg,
                #ff00ff,
                #00ffff,
                #ffffff,
                #00ffff,
                #ff00ff
            );

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            text-shadow:
                0 0 10px rgba(255,255,255,0.5),
                0 0 20px rgba(0,255,255,0.5);
        }

        /* Chatbot Area */
        .chat-container {
            position: absolute;
            top: 90px;
            left: 0;
            width: 100%;
            height: calc(100vh - 90px);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="header">
        <h1>GHOSHAI</h1>
    </div>

    <!-- Chatbot -->
    <div class="chat-container">
        <iframe 
            src="https://interfaces.zapier.com/embed/chatbot/cmpo45p4t000a6cdqegtvm39t"
            allow="clipboard-write *">
        </iframe>
    </div>

</body>
</html>
