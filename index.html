<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GhoshAI</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: transparent;
        }

        /* RGB Animated Header */
        .header {
            width: 100%;
            height: 70px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;

            display: flex;
            align-items: center;
            justify-content: center;

            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);

            border-bottom: 2px solid transparent;

            animation: rgbBorder 18s linear infinite;
        }

        .header h1 {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;

            background: linear-gradient(
                90deg,
                #ff0000,
                #ff7300,
                #00ff00,
                #00ffff,
                #0000ff,
                #ff00ff,
                #ff0000
            );

            background-size: 500%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            animation: rgbText 20s linear infinite;
        }

        @keyframes rgbText {
            0% {
                background-position: 0%;
            }
            100% {
                background-position: 500%;
            }
        }

        @keyframes rgbBorder {
            0% {
                border-color: red;
                box-shadow: 0 0 10px red;
            }

            25% {
                border-color: lime;
                box-shadow: 0 0 10px lime;
            }

            50% {
                border-color: cyan;
                box-shadow: 0 0 10px cyan;
            }

            75% {
                border-color: magenta;
                box-shadow: 0 0 10px magenta;
            }

            100% {
                border-color: red;
                box-shadow: 0 0 10px red;
            }
        }

        /* Chatbot Container */
        .chat-container {
            position: absolute;
            top: 70px;
            left: 0;
            width: 100%;
            height: calc(100vh - 70px);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

    <!-- RGB Header -->
    <div class="header">
        <h1>GhoshAI</h1>
    </div>

    <!-- Chatbot -->
    <div class="chat-container">
        <iframe 
            src="https://interfaces.zapier.com/embed/chatbot/cmpo45p4t000a6cdqegtvm39t"
            allow="clipboard-write *">
        </iframe>
    </div>

</body>
</html>
