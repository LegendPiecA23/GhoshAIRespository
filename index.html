<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GhoshAI</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #ffffff;
        }

        /* HEADER */
        .header {
            width: 100%;
            height: 90px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;

            display: flex;
            align-items: center;
            justify-content: center;

            background: #ffffff;

            /* RGB animated border */
            border-bottom: 3px solid transparent;
            animation: rgbBorder 6s linear infinite;
        }

        /* RGB TEXT */
        .header h1 {
            font-size: 34px;
            font-weight: bold;
            letter-spacing: 8px;

            background: linear-gradient(
                90deg,
                #ff0000,
                #ff7300,
                #00ff00,
                #00ffff,
                #0000ff,
                #ff00ff,
                #ff0000
            );

            background-size: 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            animation: rgbText 8s linear infinite;
        }

        /* TEXT ANIMATION */
        @keyframes rgbText {
            0% { background-position: 0%; }
            100% { background-position: 400%; }
        }

        /* BORDER ANIMATION */
        @keyframes rgbBorder {
            0% {
                border-color: #ff0000;
                box-shadow: 0 2px 10px #ff0000;
            }
            25% {
                border-color: #00ff00;
                box-shadow: 0 2px 10px #00ff00;
            }
            50% {
                border-color: #00ffff;
                box-shadow: 0 2px 10px #00ffff;
            }
            75% {
                border-color: #ff00ff;
                box-shadow: 0 2px 10px #ff00ff;
            }
            100% {
                border-color: #ff0000;
                box-shadow: 0 2px 10px #ff0000;
            }
        }

        /* CHAT AREA */
        .chat-container {
            position: absolute;
            top: 90px;
            left: 0;
            width: 100%;
            height: calc(100vh - 90px);
            background: #ffffff;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>GHOSHAI</h1>
    </div>

    <div class="chat-container">
        <iframe 
            src="https://interfaces.zapier.com/embed/chatbot/cmpo45p4t000a6cdqegtvm39t"
            allow="clipboard-write *">
        </iframe>
    </div>

</body>
</html>
