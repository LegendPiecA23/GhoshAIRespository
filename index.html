<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GhoshAI</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;

            /* Light Cyan Background */
            background: #dffcff;
        }

        /* Header */
        .header {
            width: 100%;
            height: 90px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;

            display: flex;
            align-items: center;
            justify-content: center;

            background: #c9f9ff;

            border-bottom: 3px solid #00e5ff;

            box-shadow:
                0 0 10px rgba(0, 229, 255, 0.5),
                0 0 20px rgba(0, 229, 255, 0.3);
        }

        .header h1 {
            font-size: 34px;
            font-weight: bold;

            /* Increased Letter Spacing */
            letter-spacing: 8px;

            color: #008b9a;

            text-shadow:
                0 0 8px rgba(0, 229, 255, 0.6);
        }

        /* Chatbot Area */
        .chat-container {
            position: absolute;
            top: 90px;
            left: 0;
            width: 100%;
            height: calc(100vh - 90px);

            background: #dffcff;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="header">
        <h1>GHOSHAI</h1>
    </div>

    <!-- Chatbot -->
    <div class="chat-container">
        <iframe 
            src="https://interfaces.zapier.com/embed/chatbot/cmpo45p4t000a6cdqegtvm39t"
            allow="clipboard-write *">
        </iframe>
    </div>

</body>
</html>
