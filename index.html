
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GhoshAI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
    :root{
    --bg:#0a0a0a;
    --text:white;
    --ai:#111111;
    --user:#1b1b1b;
    --border:#222;
}
body.light{
    --bg:#f5f6fa;
    --text:#111;
    --ai:#ffffff;
    --user:#e9e9e9;
    --border:#ddd;
}
    /* SIDEBAR */

.history-sidebar{

    position:fixed;

    right:0;
    top:0;

    width:260px;
    height:100vh;

    background:rgba(10,10,10,0.92);

    backdrop-filter:blur(14px);

    border-right:1px solid rgba(255,255,255,0.06);

    padding:20px 14px;

    overflow-y:auto;

    z-index:999;
}

/* TITLE */

.history-title{

    font-size:22px;
    font-weight:700;

    margin-bottom:20px;

    color:white;
}

/* CHAT ITEM */

.history-item{

    background:rgba(255,255,255,0.04);

    padding:12px;

    border-radius:12px;

    margin-bottom:10px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    cursor:pointer;

    transition:.25s;
}

.history-item:hover{

    background:rgba(138,46,255,0.12);
}

/* CHAT TEXT */

.history-text{

    font-size:14px;

    color:white;

    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;

    width:170px;
}

/* DELETE BUTTON */

.delete-btn{

    background:none;
    border:none;

    color:rgba(255,255,255,0.6);

    cursor:pointer;

    font-size:16px;

    transition:.2s;
}

.delete-btn:hover{

    color:rgba(255,80,80,1);

    transform:scale(1.15);
}
    /* PARTICLE BACKGROUND */

.particles{

    position:fixed;
    inset:0;

    width:100%;
    height:100%;

    overflow:hidden;

    z-index:-1;
}

/* PARTICLES */

.particles span{

    position:absolute;

    bottom:-120px;

    border-radius:50%;

    background:rgba(255,255,255,0.08);

    animation:floatUp linear infinite;
}

/* FLOAT ANIMATION */

@keyframes floatUp{

    from{
        transform:
            translateY(0)
            scale(1);

        opacity:0;
    }

    10%{
        opacity:1;
    }

    90%{
        opacity:0.8;
    }

    to{
        transform:
            translateY(-120vh)
            scale(1.4);

        opacity:0;
    }

}
    /* WELCOME SCREEN */

.welcome-screen{

    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.45);

    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:99999;

    animation:fadeOut 1s ease forwards;
    animation-delay:2s;
}

/* TYPEWRITER TEXT */

.welcome-text{

    font-size:42px;
    font-weight:700;

    color:white;

    overflow:hidden;
    white-space:nowrap;

    border-right:3px solid white;

    width:0;

    animation:
        typing 1.5s steps(20,end) forwards,
        blink .7s infinite;
}

/* TYPING */

@keyframes typing{
    from{
        width:0;
    }

    to{
        width:19ch;
    }
}

/* CURSOR BLINK */

@keyframes blink{
    50%{
        border-color:transparent;
    }
}

/* SCREEN FADE OUT */

@keyframes fadeOut{

    to{
        opacity:0;
        visibility:hidden;
    }

}
/* SIDE HELLO ANIMATION */

.side-hello{
    position:fixed;
    left:30px;
    top:50%;
    transform:translateY(-50%);

    font-size:42px;
    font-weight:700;
    letter-spacing:-1px;

    background:linear-gradient(
        90deg,
        #00f0ff,
        #8a2eff,
        #ff2e63,
        #00f0ff
    );

    background-size:300% 300%;
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;

    animation:rgbMove 6s linear infinite, glowPulse 2s ease-in-out infinite;

    text-shadow:
        0 0 10px rgba(0,240,255,0.35),
        0 0 20px rgba(138,46,255,0.25),
        0 0 30px rgba(255,46,99,0.15);

    z-index:999;
    pointer-events:none;
}

/* soft glow pulse */
@keyframes glowPulse{
    0%,100%{
        transform:translateY(-50%) scale(1);
        opacity:0.9;
    }
    50%{
        transform:translateY(-50%) scale(1.08);
        opacity:1;
    }
}


.logo{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);

    font-size:48px;
    font-weight:700;

    letter-spacing:-1px;
    z-index:1000;

    padding:8px 18px;
    border-radius:12px;
    backdrop-filter:blur(10px);
    background:rgba(10,10,10,0.25);

    /* RGB TEXT ONLY */
    color:transparent;
    background-image:linear-gradient(
        90deg,
        #00f0ff,
        #8a2eff,
        #ff2e63
    );

    background-size:200% auto;
    background-clip:text;
    -webkit-background-clip:text;

    animation:logoRGB 6s linear infinite;

    text-shadow:
        0 0 10px rgba(0,240,255,0.25),
        0 0 20px rgba(138,46,255,0.20);
        transition: transform 0.25s ease;
cursor: pointer;
}
.logo:hover{
    transform:translateX(-50%) scale(1.08);

    text-shadow:
        0 0 15px rgba(0,240,255,0.45),
        0 0 30px rgba(138,46,255,0.35),
        0 0 45px rgba(255,46,99,0.25);
}
body{
    width:100%;
    height:100vh;

    background:var(--bg);
    color:var(--text);

    font-family:'Inter',sans-serif;

    overflow-x:hidden;
    overflow-y:auto;

    transition:0.3s ease;
}
#cursorCanvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
  z-index: 9999;
}
/* IOS SWITCH */

.ios-switch{
    position:fixed;
    top:20px;
    left:20px;

    width:52px;
    height:30px;

    z-index:10000;
}

.ios-switch input{
    display:none;
}

/* BACKGROUND */

.slider{
    position:absolute;
    inset:0;

    background:#2b2b2b;

    border-radius:999px;

    cursor:pointer;

    transition:0.3s;
}

/* CIRCLE */

.slider::before{
    content:"";

    position:absolute;

    width:22px;
    height:22px;

    left:4px;
    top:4px;

    background:white;

    border-radius:50%;

    transition:0.3s;

    box-shadow:0 2px 6px rgba(0,0,0,0.3);
}

/* ON STATE */

.ios-switch input:checked + .slider{
    background:linear-gradient(90deg,#00f0ff,#8a2eff);
}

/* MOVE CIRCLE */

.ios-switch input:checked + .slider::before{
    transform:translateX(22px);
}
/* MAIN CONTAINER */

.container{
    width:100%;
    height:100vh;
    padding-right:260px;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    position:relative;
}

.new-chat-btn{

    position:fixed;
    top:28px;
    right:30px;

    display:inline-flex;
    align-items:center;

    gap:6px;

    width:auto;
    height:auto;

    padding:0;

    background:transparent;
    border:none;

    color:rgba(255,255,255,0.85);

    font-size:16px;
    font-weight:600;

    cursor:pointer;

    z-index:1000;

    transition:0.25s ease;
}

.new-chat-btn:hover{

    color:rgb(2, 183, 238);

    text-shadow:
        0 0 8px rgba(0, 247, 255, 0.7),
        0 0 18px rgba(98, 0, 255, 0.5);

    transform:scale(1.05);

    background:rgba(138,46,255,0.08);
    border-radius:8px;
    padding:4px 6px;
}

.new-chat-btn:hover{

    transform:translateY(-2px);

    border-color:#7b61ff;

    box-shadow:
        0 0 15px rgba(123,97,255,0.25);

}

.chat-area{
    width:100%;
    max-width:900px;

    height:calc(100vh - 120px);

    padding: 90px 20px 140px; /* 👈 increased top padding */

    overflow-y:auto;

    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
}

/* MESSAGE */

.message{
    width:100%;
    max-width:750px;

    padding:18px 22px;
    border-radius:22px;

    line-height:1.6;
    font-size:15px;

    color:var(--text);

    transition:0.3s ease;
}

/* USER MESSAGE */

.user{
    background:var(--user);
    color:var(--text);

    align-self:flex-end;
    border-bottom-right-radius:8px;
}

/* AI MESSAGE */

.ai{
    background:var(--ai);
    border:1px solid var(--border);

    align-self:flex-start;
    border-bottom-left-radius:8px;

    white-space:pre-wrap;
}
/* INPUT CONTAINER */

.input-container{
    width:100%;
    display:flex;
    justify-content:center;
    position:fixed;
    bottom:25px;
    left:0;
    padding:0 20px;
}

/* INPUT BAR */

/* INPUT BAR */


/* INPUT BAR */

.input-box{
    position:relative;

    width:100%;
    max-width:850px;

    display:flex;
    align-items:center;
    gap:10px;

    padding:8px;

    border-radius:999px;

    background:linear-gradient(
        90deg,
        #00f0ff,
        #8a2eff,
        #ff2e63,
        #ffd000,
        #00f0ff
    );

    background-size:300% 300%;

    animation:rgbMove 8s linear infinite;

    box-shadow:
    0 0 10px rgba(0,240,255,0.25),
    0 0 20px rgba(138,46,255,0.20),
    0 0 30px rgba(255,46,99,0.15);

    overflow:hidden;
}

/* DARK INNER LAYER */

.input-box::before{
    content:"";

    position:absolute;

    inset:2px;

    border-radius:999px;

    background:#121212;

    z-index:0;
}

/* KEEP CONTENT ABOVE */

.input-box input,
.input-box button{
    position:relative;
    z-index:1;
}

/* INPUT FIELD */

input{
    flex:1;

    background:transparent;

    border:none;
    outline:none;

    color:white;

    font-size:16px;

    padding:14px 18px;
}

/* PLACEHOLDER */

input::placeholder{
    color:#9a9a9a;
}

/* SEND BUTTON */

button{
    width:46px;
    height:46px;

    min-width:46px;

    border:none;

    border-radius:50%;

    cursor:pointer;

    background:linear-gradient(
        135deg,
        #7b61ff,
        #4d8dff
    );

    color:white;

    font-size:18px;
    font-weight:bold;

    display:flex;
    justify-content:center;
    align-items:center;

    transition:.25s;
}

/* HOVER */

button:hover{
    transform:scale(1.08);

    box-shadow:
    0 0 15px rgba(123,97,255,0.45);
}

/* RGB MOVEMENT */

@keyframes rgbMove{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }

}


/* INPUT */


/* SCROLLBAR */

.chat-area::-webkit-scrollbar{
    width:5px;
}

.chat-area::-webkit-scrollbar-thumb{
    background:#222;
    border-radius:10px;
}

/* ANIMATION */

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}
/* MOBILE OPTIMIZATION */

@media(max-width:768px){

    /* LOGO */

    .logo{

        font-size:32px;

        top:18px;

        padding:6px 14px;
    }

    /* SIDE HELLO */

    .side-hello{

        display:none;
    }

    /* CHAT AREA */

    .chat-area{

        padding:90px 14px 120px;

        gap:14px;
    }

    /* MESSAGES */

    .message{

        max-width:100%;

        font-size:14px;

        padding:15px 16px;

        border-radius:18px;
    }

    /* INPUT CONTAINER */

    .input-container{

        bottom:18px;

        padding:0 12px;
    }

    /* INPUT BOX */

    .input-box{

        padding:6px;

        border-radius:999px;
    }

    /* INPUT */

    input{

        font-size:15px;

        padding:12px 14px;
    }

    /* SEND BUTTON */

    #sendBtn{

        width:44px;
        height:44px;

        min-width:44px;

        font-size:16px;
    }

    /* NEW CHAT BUTTON */

    .new-chat-btn{

        top:24px;
        right:18px;

        font-size:14px;
    }

    /* WELCOME TEXT */

    .welcome-text{

        font-size:28px;

        text-align:center;
    }

}
</style>
</head>

<body>

    <label class="ios-switch">

          <div class="robot-container">

</div>

<script>

};

toggle.addEventListener("change", () => {

    const particles = document.querySelector(".particles");

        colors[Math.floor(Math.random() * colors.length)];

    particle.style.boxShadow =
        `0 0 12px ${particle.style.background}`;

    particles.appendChild(particle);
}

/* ENTER KEY */

            reply.substring(0, i + 1) + "▋";

        i++;

    }else{

        currentChat.messages.push({

        loadHistory();

}

typeEffect();

    chatArea.scrollTop = chatArea.scrollHeight;
}
document.getElementById("sendBtn").addEventListener("click", sendMessage);
window.onload = function(){

    loadHistory();

    chatArea.innerHTML = `
        <div class="message ai">
            Hello 👋 <br><br>
            I’m GhoshAI. How can I help you today?
        </div>
    `;
}
function newChat(){

    // 1. Save current chat first
    saveCurrentChat();

    // 2. Reset active chat object
    currentChat = {
        id: Date.now(),
        title: "New Chat",
        messages: []
    };

    // 3. Clear UI
    chatArea.innerHTML = `
        <div class="message ai">
            Hello 👋 <br><br>
            I’m GhoshAI. How can I help you today?
        </div>
    `;

}
function loadHistory(){

    const historyList =
        document.getElementById("historyList");

    historyList.innerHTML = "";

    let chats =
        JSON.parse(localStorage.getItem("ghoshai-chats"))
        || [];

    chats.forEach((chat, index) => {

        const item =
            document.createElement("div");

        item.classList.add("history-item");

        item.innerHTML = `
            <div class="history-text">
                ${chat.messages?.[0]?.text || "New Chat"}
            </div>

            <button class="delete-btn"
            onclick="deleteChat(${index})">
                🗑
            </button>
        `;

        historyList.appendChild(item);

    });

}
function deleteChat(index){

    let chats =
        JSON.parse(localStorage.getItem("ghoshai-chats"))
        || [];

    chats.splice(index,1);

    localStorage.setItem(
        "ghoshai-chats",
        JSON.stringify(chats)
    );

    loadHistory();
}
function saveCurrentChat(){

    if(currentChat.messages.length === 0) return;

    // check if chat already exists
    let index = chats.findIndex(c => c.id === currentChat.id);

    if(index !== -1){
        // update existing chat
        chats[index] = currentChat;
    } else {
        // add new chat
        chats.unshift(currentChat);
    }

    localStorage.setItem("ghoshai-chats", JSON.stringify(chats));
}
