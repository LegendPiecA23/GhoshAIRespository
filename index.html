<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GhoshAI</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;

            /* Match chatbot iframe background (clean white UI) */
            background: #ffffff;
        }

        /* Header */
        .header {
            width: 100%;
            height: 90px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;

            display: flex;
            align-items: center;
            justify-content: center;

            background: #ffffff;

            border-bottom: 1px solid rgba(0,0,0,0.08);
        }

        /* RGB TEXT (kept + animated) */
        .header h1 {
            font-size: 34px;
            font-weight: bold;
            letter-spacing: 8px;

            background: linear-gradient(
                90deg,
                #ff0000,
                #ff7300,
                #00ff00,
                #00ffff,
                #0000ff,
                #ff00ff,
                #ff0000
            );

            background-size: 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            animation: rgbText 8s linear infinite;
        }

        @keyframes rgbText {
            0% { background-position: 0%; }
            100% { background-position: 400%; }
        }

        /* Chatbot Area */
        .chat-container {
            position: absolute;
            top: 90px;
            left: 0;
            width: 100%;
            height: calc(100vh - 90px);

            background: #ffffff;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>GHOSHAI</h1>
    </div>

    <div class="chat-container">
        <iframe 
            src="https://interfaces.zapier.com/embed/chatbot/cmpo45p4t000a6cdqegtvm39t"
            allow="clipboard-write *">
        </iframe>
    </div>

</body>
</html>
